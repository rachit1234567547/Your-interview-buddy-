services:
  # Backend Web Service
  - type: web
    name: your-interview-buddy-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: web
    name: your-interview-buddy-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: your-interview-buddy-backend
          value: url
